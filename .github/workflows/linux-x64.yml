name: Linux x64

on:
  push:
    branches: [linux-x64-custom]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Format check
        run: cargo fmt --manifest-path cli/Cargo.toml -- --check

      - name: Clippy check
        run: cargo clippy --manifest-path cli/Cargo.toml -- -D warnings

      - name: Run unit tests
        run: cargo test --profile ci --manifest-path cli/Cargo.toml

      - name: Build native binary (Linux x64)
        run: |
          node scripts/sync-version.js
          cargo build --release --manifest-path cli/Cargo.toml
          node scripts/copy-native.js

      - name: Verify binary exists and is executable
        run: |
          BINARY=bin/agent-browser-linux-x64
          if [ ! -f "$BINARY" ]; then
            echo "ERROR: Binary not found at $BINARY"
            exit 1
          fi
          if [ ! -x "$BINARY" ]; then
            echo "ERROR: Binary is not executable"
            exit 1
          fi
          echo "Binary size: $(stat -c%s "$BINARY") bytes"
          "$BINARY" --version
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-browser-linux-x64
          path: bin/agent-browser-linux-x64
          retention-days: 7

      - name: Install Chrome
        run: |
          cargo run --manifest-path cli/Cargo.toml -- install --with-deps

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run e2e tests

        run: cargo test --profile ci --manifest-path cli/Cargo.toml e2e -- --ignored --test-threads=1
      - name: Test daemon lifecycle
        run: |
          BINARY=bin/agent-browser-linux-x64
          echo "--- Opening page ---"
          "$BINARY" open https://example.com
          echo "--- Taking snapshot ---"
          "$BINARY" snapshot
          echo "--- Closing browser ---"
          "$BINARY" close
          echo "--- Daemon lifecycle test passed ---"
